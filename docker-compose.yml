services:
  postgres:
    image: postgres:16
    container_name: url_shortener_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: url_shortener
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: url_shortener_backend
    env_file:
      - ./backend/.env.docker
    depends_on:
      - postgres
    ports:
      - "3001:3001"
    command: sh -c "npx prisma migrate deploy && node dist/src/main.js"

  frontend:
    build: ./frontend
    container_name: url_shortener_frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data: